<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizar Cartão - Cliente</title>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 800px;
            width: 100%;
            text-align: center;
        }
        
        .header {
            margin-bottom: 30px;
        }
        
        .header h1 {
            color: #2d3748;
            margin-bottom: 10px;
            font-size: 2.5rem;
        }
        
        .header p {
            color: #718096;
            font-size: 1.1rem;
        }
        
        .search-section {
            background: #f7fafc;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
        }
        
        .search-box {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 16px;
            margin-bottom: 15px;
        }
        
        .search-box:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s;
            width: 100%;
        }
        
        .btn:hover {
            background: #5a6fd8;
            transform: translateY(-2px);
        }
        
        .btn-success {
            background: #48bb78;
        }
        
        .btn-success:hover {
            background: #38a169;
        }

        .btn-warning {
            background: #ed8936;
        }
        
        .btn-warning:hover {
            background: #dd7711;
        }

        .btn-danger {
            background: #e53e3e;
        }
        
        .btn-danger:hover {
            background: #c53030;
        }

        .btn-primary {
            background: #805ad5;
        }
        
        .btn-primary:hover {
            background: #6b46c1;
        }
        
        .preview-section {
            display: none;
            margin-top: 30px;
        }
        
        .card-container {
            position: relative;
            width: 100%;
            height: 400px;
            max-width: 600px;
            margin: 0 auto 30px;
            background-color: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        
        .card-background-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        
        .card-background {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }
        
        .card-element {
            position: absolute;
            z-index: 2;
        }
        
        /* LOGO 1 - NO CANTO SUPERIOR ESQUERDO (NORMAL) */
        .logo-container1 {
            left: 210px;
            top: 240px;
            width: 110px;
            height: 55px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* LOGO 2 - NO CENTRO (NORMAL) */
        .logo-container2 {
            left: 50%;
            top: 30%;
            transform: translate(-50%, -50%);
            width: 150px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* LOGO 3 - NO CANTO INFERIOR DIREITO (PRETO E BRANCO) */
        .logo-container3 {
            right: 50px;
            bottom: 85px;
            width: 100px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .logo-pb {
            filter: grayscale(100%) contrast(120%);
        }
        
        .card-logo {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            display: block;
        }
        
        .card-name {
            left: 250px;
            bottom: 90px;
            font-size: 5px;
            font-weight: bold;
            color: #333;
            font-family: Arial, sans-serif;
        }
            
        .card-nameG {
            left: 140px;
            bottom: 353px;
            font-size: 10px;
            font-weight: bold;
            color: #ffffff;
            background-color: #2d3748;
            font-family: Arial, sans-serif;
        }
        
        .card-email {
            left: 280px;
            bottom: 80px;
            font-size: 5px;
            color: #666;
            font-family: Arial, sans-serif;
        }
        
        .card-tel {
            left: 195px;
            bottom: 80px;
            font-size: 5px;
            color: #666;
            font-family: Arial, sans-serif;
        }
        
        .client-info {
            background: #f7fafc;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: left;
        }
        
        .client-info h3 {
            color: #2d3748;
            margin-bottom: 15px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 5px;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            padding: 5px 0;
        }
        
        .info-label {
            font-weight: 600;
            color: #4a5568;
        }
        
        .info-value {
            color: #2d3748;
            text-align: right;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
            color: #667eea;
            font-weight: bold;
        }
        
        .error {
            display: none;
            background: #fed7d7;
            color: #c53030;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            border-left: 4px solid #c53030;
        }
        
        .success {
            display: none;
            background: #c6f6d5;
            color: #2f855a;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            border-left: 4px solid #2f855a;
        }
        
        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .action-buttons .btn {
            width: auto;
            min-width: 200px;
        }

        /* MEDIA QUERIES CALCULADAS EXATAMENTE */
        
        /* Tablet (768px pra baixo) - 75% do tamanho original */
        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }
            
            .header h1 {
                font-size: 2rem;
            }
            
            .action-buttons {
                flex-direction: column;
            }
            
            .action-buttons .btn {
                width: 100%;
            }
            
            .card-container {
                height: 300px; /* 400px * 0.75 = 300px */
                max-width: 450px; /* 600px * 0.75 = 450px */
            }
            
            .logo-container1 {
                left: 157px; /* 210px * 0.75 = 157px */
                top: 180px; /* 240px * 0.75 = 180px */
                width: 82px; /* 110px * 0.75 = 82px */
                height: 41px; /* 55px * 0.75 = 41px */
            }
            
            .logo-container2 {
                width: 112px; /* 150px * 0.75 = 112px */
                height: 60px; /* 80px * 0.75 = 60px */
            }
            
            .logo-container3 {
                right: 37px; /* 50px * 0.75 = 37px */
                bottom: 63px; /* 85px * 0.75 = 63px */
                width: 75px; /* 100px * 0.75 = 75px */
                height: 37px; /* 50px * 0.75 = 37px */
            }
            
            .card-name {
                left: 187px; /* 250px * 0.75 = 187px */
                bottom: 67px; /* 90px * 0.75 = 67px */
                font-size: 4px; /* 5px * 0.8 = 4px */
            }
                
            .card-nameG {
                left: 105px; /* 140px * 0.75 = 105px */
                bottom: 264px; /* 353px * 0.75 = 264px */
                font-size: 8px; /* 10px * 0.8 = 8px */
            }
            
            .card-email {
                left: 210px; /* 280px * 0.75 = 210px */
                bottom: 60px; /* 80px * 0.75 = 60px */
                font-size: 4px; /* 5px * 0.8 = 4px */
            }
            
            .card-tel {
                left: 146px; /* 195px * 0.75 = 146px */
                bottom: 60px; /* 80px * 0.75 = 60px */
                font-size: 4px; /* 5px * 0.8 = 4px */
            }
        }

        /* Mobile (480px pra baixo) - 50% do tamanho original */
        @media (max-width: 480px) {
            .card-container {
                height: 200px; /* 400px * 0.5 = 200px */
                max-width: 300px; /* 600px * 0.5 = 300px */
            }
            
            .logo-container1 {
                left: 105px; /* 210px * 0.5 = 105px */
                top: 120px; /* 240px * 0.5 = 120px */
                width: 55px; /* 110px * 0.5 = 55px */
                height: 27px; /* 55px * 0.5 = 27px */
            }
            
            .logo-container2 {
                width: 75px; /* 150px * 0.5 = 75px */
                height: 40px; /* 80px * 0.5 = 40px */
            }
            
            .logo-container3 {
                right: 25px; /* 50px * 0.5 = 25px */
                bottom: 42px; /* 85px * 0.5 = 42px */
                width: 50px; /* 100px * 0.5 = 50px */
                height: 25px; /* 50px * 0.5 = 25px */
            }
            
            .card-name {
                left: 125px; /* 250px * 0.5 = 125px */
                bottom: 45px; /* 90px * 0.5 = 45px */
                font-size: 3px; /* 5px * 0.6 = 3px */
            }
                
            .card-nameG {
                left: 70px; /* 140px * 0.5 = 70px */
                bottom: 176px; /* 353px * 0.5 = 176px */
                font-size: 6px; /* 10px * 0.6 = 6px */
            }
            
            .card-email {
                left: 140px; /* 280px * 0.5 = 140px */
                bottom: 40px; /* 80px * 0.5 = 40px */
                font-size: 3px; /* 5px * 0.6 = 3px */
            }
            
            .card-tel {
                left: 97px; /* 195px * 0.5 = 97px */
                bottom: 40px; /* 80px * 0.5 = 40px */
                font-size: 3px; /* 5px * 0.6 = 3px */
            }
        }

        /* Mobile muito pequeno (360px pra baixo) - 40% do tamanho original */
        @media (max-width: 360px) {
            .card-container {
                height: 160px; /* 400px * 0.4 = 160px */
                max-width: 240px; /* 600px * 0.4 = 240px */
            }
            
            .logo-container1 {
                left: 84px; /* 210px * 0.4 = 84px */
                top: 96px; /* 240px * 0.4 = 96px */
                width: 44px; /* 110px * 0.4 = 44px */
                height: 22px; /* 55px * 0.4 = 22px */
            }
            
            .logo-container2 {
                width: 60px; /* 150px * 0.4 = 60px */
                height: 32px; /* 80px * 0.4 = 32px */
            }
            
            .logo-container3 {
                right: 20px; /* 50px * 0.4 = 20px */
                bottom: 34px; /* 85px * 0.4 = 34px */
                width: 40px; /* 100px * 0.4 = 40px */
                height: 20px; /* 50px * 0.4 = 20px */
            }
            
            .card-name {
                left: 100px; /* 250px * 0.4 = 100px */
                bottom: 36px; /* 90px * 0.4 = 36px */
                font-size: 2px; /* 5px * 0.4 = 2px */
            }
                
            .card-nameG {
                left: 56px; /* 140px * 0.4 = 56px */
                bottom: 141px; /* 353px * 0.4 = 141px */
                font-size: 4px; /* 10px * 0.4 = 4px */
            }
            
            .card-email {
                left: 112px; /* 280px * 0.4 = 112px */
                bottom: 32px; /* 80px * 0.4 = 32px */
                font-size: 2px; /* 5px * 0.4 = 2px */
            }
            
            .card-tel {
                left: 78px; /* 195px * 0.4 = 78px */
                bottom: 32px; /* 80px * 0.4 = 32px */
                font-size: 2px; /* 5px * 0.4 = 2px */
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎨 Quase lá! </h1>
            <p>Digite seu email para visualizar e baixar suas logos e modelo de cartão de visita</p>
        </div>
        
        <div class="search-section">
            <input type="email" class="search-box" id="emailInput" placeholder="Digite seu email...">
            <button class="btn" onclick="buscarCliente()">🔍 Buscar Meu Cartão</button>
        </div>
        
        <div class="loading" id="loading">
            <p>Buscando seus dados...</p>
        </div>
        
        <div class="error" id="error">
            <p id="errorMessage">Cliente não encontrado. Verifique o email digitado.</p>
        </div>
        
        <div class="preview-section" id="previewSection">
            <div class="success" id="success">
                <p>Cartão encontrado! Visualize e baixe abaixo.</p>
            </div>
            
            <div class="client-info">
                <h3>📋 Seus Dados</h3>
                <div class="info-row">
                    <span class="info-label">Nome:</span>
                    <span class="info-value" id="clientName">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Empresa:</span>
                    <span class="info-value" id="clientCompany">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Email:</span>
                    <span class="info-value" id="clientEmail">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Telefone:</span>
                    <span class="info-value" id="clientPhone">-</span>
                </div>
            </div>
            
            <div class="card-container" id="cardContainer">
                <!-- Template será carregado aqui via JavaScript -->
            </div>
            
            <div class="action-buttons">
                <button class="btn btn-primary" onclick="baixarTudo()">📦 Baixar Tudo</button>
                <button class="btn btn-success" onclick="baixarCartao()">📥 Baixar PNG</button>
                <button class="btn btn-danger" onclick="baixarPDF()">📄 Baixar PDF</button>
                <button class="btn btn-warning" onclick="baixarLogos()">🎨 Baixar Logos</button>
                <button class="btn" onclick="visualizarCartao()">👁️ Visualizar em Tela Cheia</button>
            </div>
        </div>
    </div>

        // Converter para preto e branco
        function converterParaPretoBranco(base64) {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    
                    canvas.width = img.width;
                    canvas.height = img.height;
                    
                    ctx.drawImage(img, 0, 0);
                    
                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const data = imageData.data;
                    
                    for (let i = 0; i < data.length; i += 4) {
                        const red = data[i];
                        const green = data[i + 1];
                        const blue = data[i + 2];
                        
                        const gray = red * 0.299 + green * 0.587 + blue * 0.114;
                        
                        data[i] = gray;
                        data[i + 1] = gray;
                        data[i + 2] = gray;
                    }
                    
                    ctx.putImageData(imageData, 0, 0);
                    resolve(canvas.toDataURL('image/png'));
                };
                img.src = base64;
            });
        }

        // Buscar cliente por email
        async function buscarCliente() {
            const email = emailInput.value.trim().toLowerCase();
            
            if (!email) {
                mostrarErro('Por favor, digite seu email.');
                return;
            }
            
            loading.style.display = 'block';
            error.style.display = 'none';
            previewSection.style.display = 'none';
            success.style.display = 'none';
            
            try {
                const response = await fetch(FIREBASE_URL);
                const data = await response.json();
                
                if (!data) {
                    mostrarErro('Nenhum cliente encontrado.');
                    return;
                }
                
                // Buscar cliente pelo email
                const clientes = Object.values(data);
                clienteAtual = clientes.find(cliente => 
                    cliente.email && cliente.email.toLowerCase() === email
                );
                
                if (!clienteAtual) {
                    mostrarErro('Cliente não encontrado. Verifique o email digitado.');
                    return;
                }
                
                // Mostrar dados do cliente
                await mostrarCliente(clienteAtual);
                
            } catch (error) {
                console.error('Erro ao buscar cliente:', error);
                mostrarErro('Erro ao buscar dados. Tente novamente.');
            } finally {
                loading.style.display = 'none';
            }
        }
        
        // Mostrar dados do cliente
        async function mostrarCliente(cliente) {
            // Atualizar informações
            document.getElementById('clientName').textContent = cliente.nome || 'Não informado';
            document.getElementById('clientCompany').textContent = cliente.empresaNome || cliente.nomeFantasia || 'Não informado';
            document.getElementById('clientEmail').textContent = cliente.email || 'Não informado';
            document.getElementById('clientPhone').textContent = cliente.telefone || 'Não informado';
            
            // Atualizar cartão
            await atualizarCartao(cliente);
            
            // Mostrar seção de preview
            previewSection.style.display = 'block';
            success.style.display = 'block';
        }
        
        // Atualizar cartão com dados do cliente
        async function atualizarCartao(cliente) {
            const nameElement = document.getElementById('nameElement');
            const nameElementG = document.getElementById('nameElementG');
            const emailElement = document.getElementById('emailElement');
            const telElement = document.getElementById('telElement');
            const cardLogo1 = document.getElementById('cardLogo1');
            const cardLogo2 = document.getElementById('cardLogo2');
            const cardLogo3 = document.getElementById('cardLogo3');
            
            // Atualizar textos
            const empresaNome = cliente.empresaNome || cliente.nomeFantasia || 'Nome da Empresa';
            nameElement.textContent = empresaNome;
            nameElementG.textContent = empresaNome;
            emailElement.textContent = cliente.email || 'email@empresa.com';
            telElement.textContent = cliente.telefone || '(11) 99999-9999';
            
            // Atualizar logos se existir
            if (cliente.logoBase64) {
                logoPBBase64 = await converterParaPretoBranco(cliente.logoBase64);
                
                // Logo 1 e 2 - normais
                cardLogo1.src = cliente.logoBase64;
                cardLogo1.style.display = 'block';
                
                cardLogo2.src = cliente.logoBase64;
                cardLogo2.style.display = 'block';
                
                // Logo 3 - preto e branco
                cardLogo3.src = logoPBBase64;
                cardLogo3.style.display = 'block';
            }
        }

        // Baixar cartão como PNG
        function baixarCartao() {
            if (!clienteAtual) return;
            
            const loadingTemp = document.createElement('div');
            loadingTemp.style.cssText = `
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);

            loadingTemp.textContent = 'Gerando PNG... Aguarde!';
            document.body.appendChild(loadingTemp);
            
            html2canvas(cardContainer, {
                width: 600,
                height: 400,
                scale: 3,
                useCORS: true,
                allowTaint: false,
                backgroundColor: null,
                logging: false
            }).then(canvas => {
                const imageData = canvas.toDataURL('image/png');
                
                const link = document.createElement('a');
                link.download = `cartao-visita-${clienteAtual.nome || 'cliente'}.png`;
                link.href = imageData;
                
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                document.body.removeChild(loadingTemp);
                
            }).catch(error => {
                console.error('Erro ao gerar PNG:', error);
                alert('Erro ao gerar o PNG. Tente novamente.');
                document.body.removeChild(loadingTemp);
            });
        }

        // PDF com capa (nova função)
        function baixarPDFComCapa() {
            if (!clienteAtual) return;
            
            const loadingTemp = document.createElement('div');
            loadingTemp.style.cssText = `
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                background: rgba(0,0,0,0.8);
                color: white;
                padding: 20px;
                border-radius: 10px;
                z-index: 10000;
            `;
            loadingTemp.textContent = 'Gerando PDF com capa... Aguarde!';
            document.body.appendChild(loadingTemp);
            
            html2canvas(cardContainer, {
                width: 600,
                height: 400,
                scale: 3,

                allowTaint: false,

                // Fundo gradiente
                pdf.setFillColor(32, 57, 97);
                pdf.rect(0, 0, 210, 297, 'F');
                
                // Logo do patrocinador

                // Título
                pdf.setFontSize(32);
                pdf.setTextColor(255, 255, 255);
                pdf.setFont('helvetica', 'bold');

                // Linha decorativa

                pdf.setLineWidth(1);
                pdf.line(60, 130, 150, 130);
                
                // Informações do cliente
                pdf.setFontSize(20);
                pdf.text('CLIENTE:', 105, 160, { align: 'center' });
                pdf.setFontSize(24);
                pdf.text(clienteAtual.nome || 'Não informado', 105, 175, { align: 'center' });
                
                pdf.setFontSize(16);
                pdf.text('EMPRESA:', 105, 195, { align: 'center' });
                pdf.setFontSize(18);
                pdf.text(clienteAtual.empresaNome || clienteAtual.nomeFantasia || 'Não informado', 105, 210, { align: 'center' });
                
                // Rodapé
                pdf.setFontSize(12);
                pdf.setTextColor(255, 255, 255, 0.7);
                
                // SEGUNDA PÁGINA - CARTAO
                pdf.addPage();
                pdf.setPage(2);
                
                // Adicionar o cartão centralizado
                const imgWidth = 180;
                const imgHeight = 120;
                const x = (210 - imgWidth) / 2;
                const y = (297 - imgHeight) / 2;
                
                pdf.addImage(imageData, 'PNG', x, y, imgWidth, imgHeight);
                
                // Informações do cliente na segunda página
                pdf.setFontSize(10);
                pdf.setTextColor(100, 100, 100);
                pdf.text(`Cliente: ${clienteAtual.nome || 'Não informado'}`, 15, 285);
                pdf.text(`Empresa: ${clienteAtual.empresaNome || clienteAtual.nomeFantasia || 'Não informado'}`, 15, 290);

                // Baixar o PDF
                pdf.save(`projeto-logomarca-${clienteAtual.nome || 'cliente'}.pdf`);
                document.body.removeChild(loadingTemp);
                
            }).catch(error => {
                console.error('Erro ao gerar PDF:', error);
                alert('Erro ao gerar o PDF. Tente novamente.');
                document.body.removeChild(loadingTemp);
            });
        }

        // PDF simples (mantida para compatibilidade)
        function baixarPDF() {
            baixarPDFComCapa();
        }
        
        // Visualizar cartão em tela cheia
        function visualizarCartao() {
            if (!clienteAtual) return;
            
            const loadingTemp = document.createElement('div');
            loadingTemp.style.cssText = `
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                background: rgba(0,0,0,0.8);
                color: white;
                padding: 20px;
                border-radius: 10px;
                z-index: 10000;
            `;
            loadingTemp.textContent = 'Gerando visualização...';
            document.body.appendChild(loadingTemp);
            
            html2canvas(cardContainer, {
                width: 600,
                height: 400,
                scale: 2,
                useCORS: true,
                allowTaint: false,
                backgroundColor: null,
                logging: false
            }).then(canvas => {
                const imageWindow = window.open();
                imageWindow.document.write(`
                    <!DOCTYPE html>
                    <html>
                        <head>
                            <title>Cartão de Visita - ${clienteAtual.nome || 'Cliente'}</title>
                            <style>
                                body { 
                                    display: flex; 
                                    justify-content: center; 
                                    align-items: center; 
                                    height: 100vh; 
                                    margin: 0; 
                                    background: #f0f0f0;
                                    flex-direction: column;
                                    gap: 20px;
                                }
                                img { 
                                    max-width: 95vw; 
                                    max-height: 85vh; 
                                    box-shadow: 0 8px 25px rgba(0,0,0,0.3);
                                    border-radius: 10px;
                                }
                                .btn {
                                    background: #667eea;
                                    color: white;
                                    border: none;
                                    padding: 12px 24px;
                                    border-radius: 8px;
                                    cursor: pointer;
                                    font-size: 16px;
                                    text-decoration: none;
                                    display: inline-block;
                                }
                            </style>
                        </head>
                        <body>
                            <img src="${canvas.toDataURL('image/png')}" alt="Cartão de Visita">
                            <button class="btn" onclick="window.print()">🖨️ Imprimir</button>
                        </body>
                    </html>
                `);
                
                document.body.removeChild(loadingTemp);
            }).catch(error => {
                console.error('Erro ao gerar visualização:', error);
                alert('Erro ao gerar visualização. Tente novamente.');
                document.body.removeChild(loadingTemp);
            });
        }
        
        // Mostrar erro
        function mostrarErro(mensagem) {
            error.style.display = 'block';
            document.getElementById('errorMessage').textContent = mensagem;
            previewSection.style.display = 'none';
            success.style.display = 'none';
        }
    </script>
